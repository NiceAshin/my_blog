name: Daily Auto Blog Generator

on:
  schedule:
    # 每天北京时间早上 8:00 (格林威治时间 00:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持在 Action 页面手动一键触发测试

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate Blog Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_daily_blog.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs(blog): daily auto-generated blog post" || echo "No changes to commit"
          git push origin main
